name: 'OPA Test'
description: |
  Runs `opa test` against a Rego directory (or file), capturing both test
  results and coverage as JSON files for downstream consumption, writes a step
  summary, and fails the step on any failing tests. Coverage capture is
  best-effort and does not affect step outcome on its own.

  The action will install OPA automatically if it isn't already on PATH.

inputs:
  path:
    description: |
      Path to the Rego directory (or file) to test. Resolves relative to the
      workspace.
    required: true

outputs:
  results-file:
    description: 'Path of the human-readable test output written to the workspace.'
    value: 'opa-test-output.txt'
  coverage:
    description: 'The test coverage in percentage.'
    value: ${{ steps.test.outputs.coverage }}
  exit-code:
    description: '`opa test` exit code (0 = all passed).'
    value: ${{ steps.test.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Check OPA installation
      id: check-opa
      shell: bash
      run: |
        if command -v opa >/dev/null 2>&1; then
          echo "OPA already installed: $(opa version 2>/dev/null | head -1 || true)"
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup OPA
      if: steps.check-opa.outputs.installed != 'true'
      uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
      with:
        version: '1.16.2'

    - id: test
      name: Run opa test
      shell: bash
      env:
        TEST_PATH: ${{ inputs.path }}
        # Disable ANSI color codes so the captured output is plain text —
        # otherwise the step summary renders escape sequences as literal
        # garbage when wrapped in a code block.
        NO_COLOR: '1'
      run: |
        set -euo pipefail

        if [[ ! -e "$TEST_PATH" ]]; then
          echo "::error::path does not exist: $TEST_PATH"
          exit 1
        fi

        coverage_json=$(opa test --coverage --format=json "$TEST_PATH" 2>/dev/null || true)
        coverage=$(jq -r '.coverage // 0' <<< "$coverage_json" 2>/dev/null || echo "0")
        echo "coverage=$coverage" >> "$GITHUB_OUTPUT"

        # `set -e` would abort here on a failing test, so we capture the
        # pipeline's exit code via `||`. `tee` always returns 0, so under
        # `pipefail` the pipeline's exit code mirrors opa test's.
        TEST_EXIT=0
        opa test --fail-on-empty "$TEST_PATH" 2>&1 \
          | tee opa-test-output.txt || TEST_EXIT=$?

        echo "exit-code=$TEST_EXIT" >> "$GITHUB_OUTPUT"

        if [[ "$TEST_EXIT" -ne 0 ]]; then
          echo "::error::opa test failed (exit $TEST_EXIT)."
          exit "$TEST_EXIT"
        fi

    - name: Write step summary
      if: always()
      shell: bash
      env:
        COVERAGE: ${{ steps.test.outputs.coverage }}
      run: |
        {
          echo "## OPA test"
          echo ""
          if [[ -f opa-test-output.txt ]]; then
            echo '```'
            cat opa-test-output.txt
            echo '```'
            echo ""
            if [[ -n "$COVERAGE" ]]; then
              echo "**Coverage:** ${COVERAGE}%"
            fi
          else
            echo "_Tests did not run._"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
