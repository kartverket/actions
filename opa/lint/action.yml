name: 'OPA Lint'
description: |
  Runs Regal linting against a Rego directory (or file), emits a SARIF report
  for GitHub Code Scanning, writes a step summary, and fails the step on any
  violations.

  The action will install Regal automatically if it isn't already on PATH.

inputs:
  path:
    description: |
      Path to the Rego directory (or file) to lint. Resolves relative to the
      workspace.
    required: true
  upload-sarif:
    description: |
      If `'true'` (default), uploads the Regal SARIF report to GitHub Code
      Scanning so violations appear as alerts in the Security tab and inline
      in PR diffs. Requires `security-events: write` in the calling workflow's
      permissions. Set to `'false'` to skip the upload.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Check Regal installation
      id: check-regal
      shell: bash
      run: |
        if command -v regal >/dev/null 2>&1; then
          echo "Regal already installed: $(regal version 2>/dev/null | head -1 || true)"
          echo "installed=true" >> "$GITHUB_OUTPUT"
        else
          echo "installed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Regal
      if: steps.check-regal.outputs.installed != 'true'
      uses: open-policy-agent/setup-regal@761188c3b435761fa254beca508a44875619648f # v2.0.0
      with:
        version: 'v0.40.0'

    - id: lint
      name: Run Regal
      shell: bash
      env:
        REGO_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail

        if [[ ! -e "$REGO_PATH" ]]; then
          echo "::error::path does not exist: $REGO_PATH"
          exit 1
        fi

        # Two runs of regal over the same path:
        #   1. SARIF mode, captured to disk for Code Scanning upload.
        #   2. Default (pretty) mode, streamed to the job log live AND captured
        #      to a file so the summary step can embed it.
        # `bash -e` would abort on the first non-zero exit, so we capture the
        # exit code via `||` instead.
        LINT_EXIT=0
        regal lint --format sarif "$REGO_PATH" > regal-results.sarif || LINT_EXIT=$?
        regal lint "$REGO_PATH" 2>&1 | tee regal-output.txt || true

        echo "exit-code=$LINT_EXIT" >> "$GITHUB_OUTPUT"

        if [[ "$LINT_EXIT" -ne 0 ]]; then
          echo "::error::Regal found violations (exit $LINT_EXIT)."
        fi

    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@84498526a009a99c875e83ef4821a8ba52de7c22 # v4.36.0
      with:
        sarif_file: regal-results.sarif
        category: regal

    - name: Fail on violations
      if: steps.lint.outputs.exit-code != '0'
      shell: bash
      env:
        EXIT_CODE: ${{ steps.lint.outputs.exit-code }}
      run: exit "$EXIT_CODE"

    - name: Write step summary
      if: always()
      shell: bash
      run: |
        {
          echo "## OPA lint (Regal)"
          echo ""
          if [[ -f regal-output.txt ]]; then
            echo '```'
            cat regal-output.txt
            echo '```'
          else
            echo "_Lint did not run._"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
