name: test-opa

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'opa/**'
      - '.github/workflows/test-opa.yml'
  push:
    branches:
      - main
    paths:
      - 'opa/**'
      - '.github/workflows/test-opa.yml'

permissions:
  contents: read

jobs:
  # Builds the testdata policies and verifies that:
  #   - the bundle file is produced at the expected path,
  #   - test files (`*_test.rego`) are excluded from the bundle,
  #   - production policy files are present in the bundle,
  #   - push-only outputs (digest, tags, image-ref) stay empty when push=false.
  build-push-happy-path:
    name: 'build-push: build only (push=false)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: build
        uses: ./opa/build-push
        with:
          path: opa/build-push/testdata/policies
          push: 'false'

      - name: Verify bundle output
        env:
          BUNDLE_PATH: ${{ steps.build.outputs.bundle-path }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.build.outputs.tags }}
          IMAGE_REF: ${{ steps.build.outputs.image-ref }}
        run: |
          set -euo pipefail

          if [[ ! -f "$BUNDLE_PATH" ]]; then
            echo "::error::Bundle was not produced at $BUNDLE_PATH"
            exit 1
          fi

          contents=$(tar -tzf "$BUNDLE_PATH")
          echo "Bundle contents:"
          echo "$contents"

          # Test files must be excluded by the action's --ignore '*_test.rego'.
          if echo "$contents" | grep -q '_test\.rego$'; then
            echo "::error::Test files leaked into bundle"
            exit 1
          fi

          # Production policies must be present.
          for required in main.rego helpers.rego; do
            if ! echo "$contents" | grep -q "$required"; then
              echo "::error::Expected $required in bundle, but it was missing"
              exit 1
            fi
          done

          # With push=false, push-only outputs should be empty.
          for name in DIGEST TAGS IMAGE_REF; do
            value=$(printenv "$name")
            if [[ -n "$value" ]]; then
              echo "::error::Expected $name to be empty when push=false, got: $value"
              exit 1
            fi
          done

  # Verifies the action fails fast (with the expected error) when `path`
  # doesn't exist on disk.
  build-push-missing-path:
    name: 'build-push: fails when path missing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: build
        uses: ./opa/build-push
        continue-on-error: true
        with:
          path: opa/build-push/testdata/does-not-exist
          push: 'false'

      - name: Assert the build step failed
        env:
          OUTCOME: ${{ steps.build.outcome }}
        run: |
          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected build step to fail, but outcome was '$OUTCOME'"
            exit 1
          fi

  # Lints the `clean` testdata fixture — should succeed and produce a SARIF
  # report containing zero results.
  lint-clean:
    name: 'lint: clean policies pass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: lint
        uses: ./opa/lint
        with:
          path: opa/lint/testdata/clean
          # Skip Code Scanning upload in CI — this workflow only verifies the
          # action's local behaviour, not the upload integration.
          upload-sarif: 'false'

      - name: Verify SARIF report has no findings
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "success" ]]; then
            echo "::error::Expected lint step to succeed, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f regal-results.sarif ]]; then
            echo "::error::regal-results.sarif was not produced"
            exit 1
          fi

          # SARIF places findings under `.runs[0].results`.
          results=$(jq '.runs[0].results | length' regal-results.sarif)
          if [[ "$results" != "0" ]]; then
            echo "::error::Expected 0 SARIF results, got $results"
            jq '.runs[0].results' regal-results.sarif
            exit 1
          fi

  # Lints the 'clean_with_data' together with regal config file. Should succeed.
  lint-clean-with-data-and-config:
    name: 'lint: clean_with_data with Regal config pass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: lint
        uses: ./opa/lint
        with:
          path: opa/lint/testdata/clean_with_data
          # Skip Code Scanning upload in CI — this workflow only verifies the
          # action's local behaviour, not the upload integration.
          upload-sarif: 'false'
          config-file: opa/lint/testdata/clean_with_data/regal-config.yaml

      - name: Verify SARIF report has no findings
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "success" ]]; then
            echo "::error::Expected lint step to succeed, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f regal-results.sarif ]]; then
            echo "::error::regal-results.sarif was not produced"
            exit 1
          fi

          # SARIF places findings under `.runs[0].results`.
          results=$(jq '.runs[0].results | length' regal-results.sarif)
          if [[ "$results" != "0" ]]; then
            echo "::error::Expected 0 SARIF results, got $results"
            jq '.runs[0].results' regal-results.sarif
            exit 1
          fi

  # Lints the 'clean_with_data' together without regal config file. Should fail
  # as a config is needed to correctly resolve the linting error for unresolved-reference.
  lint-clean-with-data-without-config:
    name: 'lint: clean_with_data without Regal config failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: lint
        uses: ./opa/lint
        continue-on-error: true
        with:
          path: opa/lint/testdata/clean_with_data
          # Skip Code Scanning upload in CI — this workflow only verifies the
          # action's local behaviour, not the upload integration.
          upload-sarif: 'false'

      - name: Verify the lint step failed and recorded violations
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected lint step to fail, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f regal-results.sarif ]]; then
            echo "::error::regal-results.sarif was not produced"
            exit 1
          fi

          results=$(jq '.runs[0].results | length' regal-results.sarif)
          if (( results < 1 )); then
            echo "::error::Expected at least one SARIF result, got $results"
            exit 1
          fi
          echo "Recorded $results SARIF result(s) as expected."

  # Lints the `violations` testdata fixture (deliberately badly-formatted Rego)
  # — should fail with a non-zero exit code and report at least one SARIF
  # finding.
  lint-violations:
    name: 'lint: violations cause failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: lint
        uses: ./opa/lint
        continue-on-error: true
        with:
          path: opa/lint/testdata/violations
          upload-sarif: 'false'

      - name: Verify the lint step failed and recorded violations
        env:
          OUTCOME: ${{ steps.lint.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected lint step to fail, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f regal-results.sarif ]]; then
            echo "::error::regal-results.sarif was not produced"
            exit 1
          fi

          results=$(jq '.runs[0].results | length' regal-results.sarif)
          if (( results < 1 )); then
            echo "::error::Expected at least one SARIF result, got $results"
            exit 1
          fi
          echo "Recorded $results SARIF result(s) as expected."

  # Runs the `passing` testdata fixture — should succeed, expose a numeric
  # coverage percentage, and write a non-empty test output file.
  test-passing:
    name: 'test: passing tests succeed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: test
        uses: ./opa/test
        with:
          path: opa/test/testdata/passing

      - name: Verify outputs
        env:
          EXIT_CODE: ${{ steps.test.outputs.exit-code }}
          RESULTS_FILE: ${{ steps.test.outputs.results-file }}
          COVERAGE: ${{ steps.test.outputs.coverage }}
        run: |
          set -euo pipefail

          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "::error::Expected exit-code 0, got '$EXIT_CODE'"
            exit 1
          fi

          if [[ ! -s "$RESULTS_FILE" ]]; then
            echo "::error::Test output is missing or empty at $RESULTS_FILE"
            exit 1
          fi

          # Coverage must be a non-negative number (e.g. "85" or "85.7").
          if [[ ! "$COVERAGE" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Coverage output is not a number: '$COVERAGE'"
            exit 1
          fi
          echo "Tests passed with coverage ${COVERAGE}%."

  # Runs the `failing` testdata fixture (an assertion that contradicts the
  # policy) — should fail with a non-zero exit code, and the captured output
  # file should contain a FAIL marker.
  test-failing:
    name: 'test: failing tests cause failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: test
        uses: ./opa/test
        continue-on-error: true
        with:
          path: opa/test/testdata/failing

      - name: Verify the test step failed and recorded a failing test
        env:
          OUTCOME: ${{ steps.test.outcome }}
          EXIT_CODE: ${{ steps.test.outputs.exit-code }}
          RESULTS_FILE: ${{ steps.test.outputs.results-file }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected test step to fail, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "::error::Expected non-zero exit-code, got '$EXIT_CODE'"
            exit 1
          fi

          if ! grep -q 'FAIL' "$RESULTS_FILE"; then
            echo "::error::Expected a FAIL marker in $RESULTS_FILE"
            cat "$RESULTS_FILE"
            exit 1
          fi
          echo "Failing test was reported as expected."

  # Runs opa check against testdata without schemas specified.
  # Should pass as schema validation catches the type bug in the policy.
  check-passing:
    name: 'check: missing schemas succeeds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: check
        uses: ./opa/check
        with:
          path: opa/check/testdata

      - name: Verify outputs
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "success" ]]; then
            echo "::error::Expected check step to succeed without schemas, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f opa-check-output.txt ]]; then
            echo "::error::opa-check-output.txt was not produced"
            exit 1
          fi

  # Runs opa check against testdata with schemas specified.
  # Should fail as schema validation catches the type bug in the policy.
  check-failing:
    name: 'check: including schemas fails'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: check
        uses: ./opa/check
        continue-on-error: true
        with:
          path: opa/check/testdata
          schemas: opa/check/testdata/schemas

      - name: Verify outputs
        env:
          OUTCOME: ${{ steps.check.outcome }}
        run: |
          set -euo pipefail

          if [[ "$OUTCOME" != "failure" ]]; then
            echo "::error::Expected check step to fail with schemas, got outcome '$OUTCOME'"
            exit 1
          fi
          if [[ ! -f opa-check-output.txt ]]; then
            echo "::error::opa-check-output.txt was not produced"
            exit 1
          fi

          # Schema validation should report the allowed field names. We grep
          # with `-F` (fixed string) so the brackets / quotes aren't interpreted
          # as regex metacharacters.
          expected='want (one of): ["name" "role"]'
          if ! grep -qF "$expected" opa-check-output.txt; then
            echo "::error::Expected output to contain: $expected"
            echo "Actual output:"
            cat opa-check-output.txt
            exit 1
          fi
          echo "Schema validation reported the expected fields."